<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pool Challenge | Cube &amp; Triangle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #f0f0f0;
      --muted:   #666;
      --green:   #4ade80;
      --red:     #f87171;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 0.75rem 1.25rem;
      gap: 0.6rem;
      min-height: 100dvh;
    }

    /* ── HUD ── */
    .hud {
      width: 100%;
      max-width: 820px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 0.55rem 1rem;
    }

    .hud-brand {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .hud-stats {
      display: flex;
      gap: 1.4rem;
    }

    .hud-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.15;
    }

    .hud-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .hud-value {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--green);
      transition: color 0.3s;
      min-width: 2ch;
      text-align: center;
    }

    .hud-value.urgent {
      color: var(--red);
      animation: blink 0.6s infinite alternate;
    }

    @keyframes blink {
      to { opacity: 0.45; }
    }

    /* ── CANVAS ── */
    .canvas-wrap {
      width: 100%;
      max-width: 820px;
      position: relative;
      border-radius: 0.5rem;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      cursor: crosshair;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── GAME OVER OVERLAY ── */
    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 5, 0.88);
      backdrop-filter: blur(4px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      z-index: 20;
    }

    .overlay.active { display: flex; }

    .overlay-title {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .overlay-score-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .overlay-score {
      font-size: clamp(3rem, 10vw, 4.5rem);
      font-weight: 800;
      color: var(--green);
      line-height: 1;
    }

    .btn-play-again {
      margin-top: 0.4rem;
      background: var(--green);
      color: #0a0a0a;
      border: none;
      padding: 0.7rem 2.2rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-play-again:hover  { opacity: 0.85; }
    .btn-play-again:active { transform: scale(0.97); }

    .overlay-back {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      margin-top: 0.2rem;
      transition: color 0.15s;
    }
    .overlay-back:hover { color: var(--text); }

    /* ── HINT ── */
    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="hud">
    <span class="hud-brand">Cube &amp; Triangle</span>
    <div class="hud-stats">
      <div class="hud-stat">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="scoreEl">0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Time</span>
        <span class="hud-value" id="timeEl">60</span>
      </div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="800" height="400"></canvas>

    <div class="overlay" id="overlay">
      <div class="overlay-title">Time&#8217;s Up!</div>
      <div class="overlay-score-label">Final Score</div>
      <div class="overlay-score" id="finalEl">0</div>
      <button class="btn-play-again" id="playAgainBtn">Play Again</button>
      <a class="overlay-back" href="../">&#8592; Back to Cube &amp; Triangle</a>
    </div>
  </div>

  <p class="hint">Place cue ball, then drag to aim &mdash; release to shoot</p>

<script>
'use strict';

// ── CANVAS & CONTEXT ─────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreEl');
const timeEl  = document.getElementById('timeEl');
const finalEl = document.getElementById('finalEl');
document.getElementById('playAgainBtn').addEventListener('click', startGame);

// ── LAYOUT CONSTANTS ─────────────────────────────────────────────────────────
// Detect orientation and calculate responsive canvas dimensions
const isPortrait = window.innerHeight > window.innerWidth;

let CW, CH;
if (isPortrait) {
  // Portrait: use 85% of viewport height, maintain 2:1 ratio
  const availHeight = window.innerHeight - 120; // subtract HUD + padding
  CH = Math.min(availHeight * 0.9, 800);        // max 800px height
  CW = CH / 2;                                   // 2:1 ratio (width is half height)
} else {
  // Landscape: traditional desktop layout
  CW = 800;
  CH = 400;
}

// Update canvas size
canvas.width  = CW;
canvas.height = CH;

const CU = CW * 0.0375;          // cushion thickness (3.75% of width)
const TX = CU, TY = CU;          // table felt top-left
const TW = CW - CU * 2;          // table width (short side)
const TH = CH - CU * 2;          // table height (long side)

// Ball sizes - proper English pool proportions
const OBR = TW * 0.0278;         // object ball radius (2.78% of table width)
const CBR = TW * 0.0260;         // cue ball radius (2.60% of table width - slightly smaller)
const PR = OBR * 1.8;            // pocket radius

// Pocket positions — 4 corners + 2 centre (long-rail midpoints)
// In portrait: long rails are vertical (left/right), short rails are horizontal (top/bottom)
// In landscape: long rails are horizontal (top/bottom), short rails are vertical (left/right)
const POCKETS = [
  { x: TX,        y: TY            },  // top-left corner
  { x: TX + TW,   y: TY            },  // top-right corner
  { x: TX,        y: TY + TH / 2   },  // left-center (long rail midpoint)
  { x: TX + TW,   y: TY + TH / 2   },  // right-center (long rail midpoint)
  { x: TX,        y: TY + TH       },  // bottom-left corner (baulk end)
  { x: TX + TW,   y: TY + TH       },  // bottom-right corner (baulk end)
];

// Physics walls (use object ball radius as max for bounds)
const WL = TX + OBR,  WR = TX + TW - OBR;
const WT = TY + OBR,  WB = TY + TH - OBR;

// Break line (1/5 of table length from baulk cushion at bottom)
const BREAK_LINE_Y = TY + TH - (TH * 0.2);

// ── PHYSICS TUNING ───────────────────────────────────────────────────────────
const FRICTION   = 0.985;
const REBOUND    = 0.92;
const MAX_VEL    = 18;
const STOP_VEL   = 0.06;        // velocity threshold for "stopped"
const GAME_SECS  = 60;          // 60 seconds of active gameplay
const TIME_BONUS = 2;           // seconds added per potted ball

// Ball colours
const COL = { red:'#e03030', yellow:'#e8c02a', black:'#1a1a1a', white:'#f5f5f0' };

// ── STATE ────────────────────────────────────────────────────────────────────
let balls     = [];
let cueBall   = null;
let score     = 0;
let timeLeft  = GAME_SECS;
let running   = false;
let rafId     = null;
let lastTs    = null;
let timerAcc  = 0;

// Game state
let placingCueBall = false;     // true when placing cue ball before break
let breakTaken     = false;     // true after first shot
let timerActive    = false;     // true when timer should count down

// Aiming
let aiming    = false;
let aimPt     = null;   // where the drag started
let curPt     = null;   // current drag position

// ── HELPERS ──────────────────────────────────────────────────────────────────
function d2(a, b) { const dx=a.x-b.x, dy=a.y-b.y; return dx*dx+dy*dy; }
function dist(a, b) { return Math.sqrt(d2(a, b)); }

function allStopped() {
  return balls.every(b => b.potted || (Math.abs(b.vx) < STOP_VEL && Math.abs(b.vy) < STOP_VEL));
}

function cueBallStopped() {
  if (!cueBall || cueBall.potted) return true;
  return Math.abs(cueBall.vx) < STOP_VEL && Math.abs(cueBall.vy) < STOP_VEL;
}

function scalePoint(e) {
  const r   = canvas.getBoundingClientRect();
  const sx  = CW / r.width;
  const sy  = CH / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
}

// ── BALL PLACEMENT ───────────────────────────────────────────────────────────
function findFreeSpot(existing, x0, x1, y0, y1, tries) {
  tries = tries || 300;
  for (let i = 0; i < tries; i++) {
    const x = x0 + Math.random() * (x1 - x0);
    const y = y0 + Math.random() * (y1 - y0);
    // Check distance from all existing balls (use max ball radius for safety)
    if (existing.every(b => dist({x,y}, b) > (b.radius || OBR) + CBR + OBR * 0.5)) return { x, y };
  }
  return null;
}

function initBalls() {
  balls = [];

  // Create proper English pool rack (15 balls: 7 red, 7 yellow, 1 black)
  // Rack positioned at legal spot: ~70% from baulk cushion
  const rackCenterX = TX + TW / 2;                    // centered horizontally
  const rackCenterY = (TY + TH) - (TH * 0.7);        // 70% from baulk (at bottom)
  const gap = OBR * 2.001;                            // tight packing (balls touching)

  // English pool rack pattern (5 rows forming triangle):
  // In portrait mode, apex (row 0) is at the BOTTOM (closest to player)
  // Base (row 4) is at the TOP (furthest from player)
  // Row 0: 1 ball (apex - faces breaking player at bottom)
  // Row 1: 2 balls
  // Row 2: 3 balls (black in center)
  // Row 3: 4 balls
  // Row 4: 5 balls (base - away from player)

  const pattern = [
    // Row 0 (apex - closest to player)
    { row: 0, col: 0, type: 'red' },
    // Row 1
    { row: 1, col: 0, type: 'yellow' },
    { row: 1, col: 1, type: 'red' },
    // Row 2 (black in center)
    { row: 2, col: 0, type: 'red' },
    { row: 2, col: 1, type: 'black' },
    { row: 2, col: 2, type: 'yellow' },
    // Row 3
    { row: 3, col: 0, type: 'yellow' },
    { row: 3, col: 1, type: 'red' },
    { row: 3, col: 2, type: 'yellow' },
    { row: 3, col: 3, type: 'red' },
    // Row 4 (base - away from player)
    { row: 4, col: 0, type: 'red' },
    { row: 4, col: 1, type: 'yellow' },
    { row: 4, col: 2, type: 'yellow' },
    { row: 4, col: 3, type: 'red' },
    { row: 4, col: 4, type: 'yellow' },
  ];

  for (const p of pattern) {
    // Triangle apex points toward player (down in portrait)
    // Row 0 is at rackCenterY, rows above it go UP (decreasing Y)
    const x = rackCenterX + (p.col - p.row / 2) * gap;
    const y = rackCenterY - p.row * gap * 0.866;  // 0.866 = sin(60°), negative to go up
    balls.push({ x, y, vx: 0, vy: 0, type: p.type, potted: false, radius: OBR });
  }

  // Cue ball — place behind break line in baulk area
  cueBall = {
    x: TX + TW / 2,
    y: BREAK_LINE_Y + CBR * 2,  // behind break line
    vx: 0,
    vy: 0,
    type: 'cue',
    potted: false,
    radius: CBR
  };
  balls.push(cueBall);
}

function respotCueBall() {
  if (!running) return;
  const others = balls.filter(b => !b.potted && b !== cueBall);
  // Respot behind break line in baulk area
  const pos = findFreeSpot(others, TX + CBR * 2, TX + TW - CBR * 2, BREAK_LINE_Y, TY + TH - CBR * 2)
            || { x: TX + TW / 2, y: BREAK_LINE_Y + CBR * 2 };
  cueBall.x = pos.x; cueBall.y = pos.y;
  cueBall.vx = 0;    cueBall.vy = 0;
  cueBall.potted = false;
}

// ── PHYSICS ──────────────────────────────────────────────────────────────────
function updatePhysics() {
  const active = balls.filter(b => !b.potted);

  // Move + friction
  for (const b of active) {
    b.x += b.vx; b.y += b.vy;
    b.vx *= FRICTION; b.vy *= FRICTION;
    if (Math.abs(b.vx) < STOP_VEL) b.vx = 0;
    if (Math.abs(b.vy) < STOP_VEL) b.vy = 0;
  }

  // Cushion bounce (account for each ball's radius)
  for (const b of active) {
    const r = b.radius || OBR;
    const bWL = TX + r, bWR = TX + TW - r;
    const bWT = TY + r, bWB = TY + TH - r;

    if (b.x < bWL) { b.x = bWL; b.vx =  Math.abs(b.vx) * REBOUND; }
    if (b.x > bWR) { b.x = bWR; b.vx = -Math.abs(b.vx) * REBOUND; }
    if (b.y < bWT) { b.y = bWT; b.vy =  Math.abs(b.vy) * REBOUND; }
    if (b.y > bWB) { b.y = bWB; b.vy = -Math.abs(b.vy) * REBOUND; }
  }

  // Ball-ball collisions (account for different ball sizes)
  for (let i = 0; i < active.length; i++) {
    for (let j = i+1; j < active.length; j++) {
      const a = active[i], b = active[j];
      const ra = a.radius || OBR;
      const rb = b.radius || OBR;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      const minDist = ra + rb;

      if (d < minDist && d > 0) {
        const nx = dx/d, ny = dy/d;
        const overlap = minDist - d;
        a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

        const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
        const dot = dvx*nx + dvy*ny;
        if (dot > 0) {
          a.vx -= dot*nx * 0.97; a.vy -= dot*ny * 0.97;
          b.vx += dot*nx * 0.97; b.vy += dot*ny * 0.97;
        }
      }
    }
  }

  // Pocket detection
  for (const b of active) {
    for (const p of POCKETS) {
      if (dist(b, p) < PR * 0.88) {
        b.potted = true;
        b.vx = 0; b.vy = 0;

        if (b.type === 'cue') {
          score -= 5;
          setTimeout(respotCueBall, 700);
        } else if (b.type === 'black') {
          // Check if black ball potted legally (all other balls gone)
          const objectBalls = balls.filter(ball =>
            ball !== cueBall && ball.type !== 'cue' && ball.type !== 'black'
          );
          const allObjectsGone = objectBalls.every(ball => ball.potted);

          if (allObjectsGone) {
            // Legal black pot - VICTORY!
            score += 25;
            timeLeft += TIME_BONUS;
            updateHUD();
            setTimeout(() => showVictory(), 500);
          } else {
            // Illegal black pot - GAME OVER
            endGame();
          }
        } else {
          // Regular red or yellow ball
          score += 10;
          timeLeft += TIME_BONUS;
        }
        updateHUD();
        break;
      }
    }
  }
}

// ── RENDERING ────────────────────────────────────────────────────────────────
function drawTable() {
  // Wood surround
  ctx.fillStyle = '#2e1508';
  ctx.beginPath();
  ctx.roundRect(0, 0, CW, CH, 10);
  ctx.fill();

  // Felt
  ctx.fillStyle = '#0f3b2e';
  ctx.fillRect(TX, TY, TW, TH);

  // Subtle cloth branding
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#1b5a46';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `bold ${Math.round(CW*0.044)}px 'Outfit', sans-serif`;
  ctx.fillText('Cube & Triangle', CW/2, CH/2 - CH*0.065);
  ctx.font = `${Math.round(CW*0.026)}px 'Outfit', sans-serif`;
  ctx.fillText('Lincoln', CW/2, CH/2 + CH*0.032);
  ctx.restore();

  // Inner cushion shadow line
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  ctx.strokeRect(TX, TY, TW, TH);

  // Cushion highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.strokeRect(TX+5, TY+5, TW-10, TH-10);

  // Break line (baulk line) - runs across table width, 1/5 from baulk cushion
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(TX + 6, BREAK_LINE_Y);
  ctx.lineTo(TX + TW - 6, BREAK_LINE_Y);
  ctx.stroke();

  // Pockets
  for (const p of POCKETS) {
    // Outer ring
    ctx.beginPath();
    ctx.arc(p.x, p.y, PR+3, 0, Math.PI*2);
    ctx.fillStyle = '#180800';
    ctx.fill();
    // Hole
    ctx.beginPath();
    ctx.arc(p.x, p.y, PR, 0, Math.PI*2);
    ctx.fillStyle = '#030303';
    ctx.fill();
    // Subtle lip highlight
    ctx.beginPath();
    ctx.arc(p.x, p.y, PR, Math.PI*1.1, Math.PI*1.9);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawBall(b) {
  if (b.potted) return;

  const x = b.x, y = b.y;
  const r = b.radius || OBR;  // use ball's radius

  // Drop shadow
  ctx.beginPath();
  ctx.arc(x+2, y+3, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Ball body gradient
  const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.05, x, y, r);
  switch (b.type) {
    case 'cue':
      // Bright white cue ball with strong contrast (slightly smaller)
      g.addColorStop(0, '#ffffff'); g.addColorStop(1, '#e8e8e8'); break;
    case 'red':
      g.addColorStop(0, '#ff5858'); g.addColorStop(1, '#7a0000'); break;
    case 'yellow':
      g.addColorStop(0, '#ffe050'); g.addColorStop(1, '#906000'); break;
    case 'black':
      // Clearly dark black ball
      g.addColorStop(0, '#2a2a2a'); g.addColorStop(1, '#000000'); break;
  }
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();

  // Specular highlight
  ctx.beginPath();
  ctx.arc(x - r*0.28, y - r*0.3, r*0.23, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.52)';
  ctx.fill();
}

function drawAim() {
  // Don't show aiming controls while placing cue ball
  if (placingCueBall) return;
  if (!aiming || !aimPt || !curPt || !cueBall || cueBall.potted) return;

  const dx    = aimPt.x - curPt.x;
  const dy    = aimPt.y - curPt.y;
  const power = Math.min(Math.sqrt(dx*dx + dy*dy), 130);
  if (power < 4) return;

  const angle = Math.atan2(dy, dx);
  const endX  = cueBall.x + Math.cos(angle) * power * 2.2;
  const endY  = cueBall.y + Math.sin(angle) * power * 2.2;

  ctx.save();

  // Aim line
  ctx.globalAlpha = 0.38;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([7, 6]);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(endX, endY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Drag handle dot
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.arc(curPt.x, curPt.y, 6, 0, Math.PI*2);
  ctx.fillStyle = '#4ade80';
  ctx.fill();

  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, CW, CH);
  drawTable();
  for (const b of balls) drawBall(b);
  drawAim();
}

// ── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  scoreEl.textContent = score;
  timeEl.textContent  = timeLeft;
  timeEl.classList.toggle('urgent', timeLeft <= 10);
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!running) return;

  const dt = lastTs ? (ts - lastTs) : 16.67;
  lastTs = ts;

  updatePhysics();

  // Timer logic: only count down when cue ball is stopped
  const cueIsStopped = cueBallStopped();

  // Start timer after break shot (once cue ball stops for the first time)
  if (breakTaken && cueIsStopped && !timerActive) {
    timerActive = true;
  }

  // Count down only when cue ball is stopped and timer is active
  if (timerActive && cueIsStopped) {
    timerAcc += dt;
    if (timerAcc >= 1000) {
      timerAcc -= 1000;
      timeLeft = Math.max(0, timeLeft - 1);
      updateHUD();
      if (timeLeft === 0) { endGame(); return; }
    }
  } else if (timerActive && !cueIsStopped) {
    // Cue ball is moving, pause timer (don't accumulate time)
    timerAcc = 0;
  }

  render();
  rafId = requestAnimationFrame(loop);
}

function startGame() {
  if (rafId) cancelAnimationFrame(rafId);
  score           = 0;
  timeLeft        = GAME_SECS;
  timerAcc        = 0;
  lastTs          = null;
  aiming          = false;
  aimPt           = null;
  curPt           = null;
  running         = true;
  placingCueBall  = true;   // Start in cue ball placement mode
  breakTaken      = false;
  timerActive     = false;
  initBalls();
  overlay.classList.remove('active');
  updateHUD();
  rafId = requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  render();
  finalEl.textContent = score;
  document.querySelector('.overlay-title').textContent = "Time's Up!";
  overlay.classList.add('active');
}

function showVictory() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  render();
  finalEl.textContent = score;
  document.querySelector('.overlay-title').textContent = 'Victory!';
  overlay.classList.add('active');

  // Auto-rerack after 4 seconds
  setTimeout(() => {
    overlay.classList.remove('active');
    startGame();
  }, 4000);
}

// ── INPUT ────────────────────────────────────────────────────────────────────
function onDown(e) {
  e.preventDefault();
  if (!running || !cueBall || cueBall.potted) return;

  const p = scalePoint(e);
  const aimRadius = CBR * 3.5;  // pointer must start within this of cue ball

  // Cue ball placement mode (before break)
  if (placingCueBall) {
    if (dist(p, cueBall) <= aimRadius) {
      aiming = true;
      aimPt  = p;
      curPt  = p;
    }
    return;
  }

  // Normal aiming mode (after break)
  if (!allStopped()) return;
  if (dist(p, cueBall) <= aimRadius) {
    aiming = true;
    aimPt  = p;
    curPt  = p;
  }
}

function onMove(e) {
  e.preventDefault();
  if (!aiming) return;
  curPt = scalePoint(e);

  // If placing cue ball, move it with the pointer (constrained to baulk area)
  if (placingCueBall && cueBall) {
    // Constrain to baulk area (behind break line)
    // Max 50% of cue ball can cross the break line
    const minY = BREAK_LINE_Y - CBR * 0.5;  // 50% can cross line
    const maxY = TY + TH - CBR;              // bottom cushion

    cueBall.x = Math.max(TX + CBR, Math.min(TX + TW - CBR, curPt.x));
    cueBall.y = Math.max(minY, Math.min(maxY, curPt.y));
  }
}

function onUp(e) {
  e.preventDefault();
  if (!aiming || !cueBall) { aiming = false; return; }

  // If placing cue ball, finish placement and switch to aiming mode
  if (placingCueBall) {
    placingCueBall = false;
    aiming = false;
    aimPt  = null;
    curPt  = null;
    return;
  }

  // Normal shot
  if (!aimPt || !curPt) { aiming = false; return; }

  const dx    = aimPt.x - curPt.x;
  const dy    = aimPt.y - curPt.y;
  const power = Math.sqrt(dx*dx + dy*dy);

  if (power > 4) {
    const angle  = Math.atan2(dy, dx);
    const speed  = Math.min(power * 0.17, MAX_VEL);
    cueBall.vx   = Math.cos(angle) * speed;
    cueBall.vy   = Math.sin(angle) * speed;

    // Mark that break has been taken
    if (!breakTaken) {
      breakTaken = true;
    }
  }

  aiming = false;
  aimPt  = null;
  curPt  = null;
}

// Mouse
canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);

// Touch — prevent page scroll during play
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });
canvas.addEventListener('touchcancel',onUp,   { passive: false });

// ── START ────────────────────────────────────────────────────────────────────
startGame();
</script>
